<div class="tab-workspace-shell">
  <div class="workspace"
  [class.is-split]="splitMode"
  [class.split-opening]="splitOpening"
  [class.split-horizontal]="splitMode && splitOrientation === 'horizontal'"
  [class.split-vertical]="splitMode && splitOrientation === 'vertical'">
  <div class="pane-wrap primary"
    [style.flex-grow]="splitMode ? splitRatio * 1000 : 1"
    [style.flex-basis]="'0'">
    <app-tab-pane
      paneId="primary"
      [tabs]="primaryTabs"
      [selectedTabIndex]="primarySelected"
      [isFocused]="focusedPane === 'primary'"
      [splitMode]="splitMode"
      [splitOrientation]="splitOrientation"
      [paneEnvironmentOverrideId]="paneEnvironmentIds.primary"
      (paneMouseDown)="onPaneMouseDown($event)"
      (selectTabIndex)="onSelectTab('primary', $event)"
      (tabClose)="onCloseTab('primary', $event)"
      (tabsReorder)="onTabsReorder('primary', $event)"
      (persistReorder)="onPersistReorder()"
      (closeOtherTabs)="onCloseOtherTabs('primary', $event)"
      (closeTabsToRight)="onCloseTabsToRight('primary', $event)"
      (closeAllTabsInPane)="onCloseAllTabsInPane('primary')"
      (splitRight)="onSplitRight('primary', $event)"
      (splitLeft)="onSplitLeft('primary', $event)"
      (mergeSplit)="onMergeSplit()"
      (crossPaneTabMove)="onCrossPaneTabMove($event)"
      (paneEnvironmentOverrideChange)="onPaneEnvironmentOverride($event)"
      (tabDirtyChange)="onTabDirtyChange($event)"
      (duplicateRequestTab)="onDuplicateRequestTab('primary', $event)"
      (pinToggleTab)="onPinToggleTab('primary', $event)"
      (toggleSplitOrientation)="toggleSplitOrientation(); onPersistReorder()" />
  </div>

  @if (!splitMode && splitDropHint) {
    <div class="split-preview-overlay" aria-hidden="true">
      <div class="split-preview-zone" [class.is-target]="splitDropHint === 'left'">
        @if (splitDropHint === 'left') {
          <span class="split-preview-caption">Focused tab</span>
        } @else {
          <span class="split-preview-caption is-muted">Other tabs</span>
        }
      </div>
      <div class="split-preview-gutter" aria-hidden="true"></div>
      <div class="split-preview-zone" [class.is-target]="splitDropHint === 'right'">
        @if (splitDropHint === 'right') {
          <span class="split-preview-caption">Focused tab</span>
        } @else {
          <span class="split-preview-caption is-muted">Other tabs</span>
        }
      </div>
    </div>
  }

  @if (!splitMode && tabStripDragActive) {
    <div
      class="split-dock-strip split-dock-strip--left"
      [class.is-hot]="splitDropHint === 'left'"
      aria-hidden="true"
      title="Release to split — tab stays in the left pane"
      (dragover)="onSplitDockStripDragOver($event, 'left')"
      (drop)="onUnsplitEdgeDrop($event, 'left')"></div>
    <div
      class="split-dock-strip split-dock-strip--right"
      [class.is-hot]="splitDropHint === 'right'"
      aria-hidden="true"
      title="Release to split — tab moves to the new right pane"
      (dragover)="onSplitDockStripDragOver($event, 'right')"
      (drop)="onUnsplitEdgeDrop($event, 'right')"></div>
  }

  @if (splitMode) {
    <div class="splitter-strip" [class.is-vertical-workspace]="splitOrientation === 'vertical'">
      <div class="splitter-track"
        role="separator"
        [attr.aria-orientation]="splitOrientation === 'vertical' ? 'horizontal' : 'vertical'"
        title="Drag to resize panes"
        (mousedown)="onSplitResizeStart($event)">
      </div>
      <button type="button"
        class="join-panes-btn"
        title="Join panes (close split)"
        aria-label="Join panes, close split"
        (mousedown)="$event.stopPropagation()"
        (click)="onMergeSplit()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="11 17 6 12 11 7"></polyline>
          <polyline points="18 17 13 12 18 7"></polyline>
        </svg>
      </button>
    </div>
    <div class="pane-wrap secondary"
      [style.flex-grow]="(1 - splitRatio) * 1000"
      [style.flex-basis]="'0'">
      <app-tab-pane
        paneId="secondary"
        [tabs]="secondaryTabs"
        [selectedTabIndex]="secondarySelected"
        [isFocused]="focusedPane === 'secondary'"
        [splitMode]="splitMode"
        [splitOrientation]="splitOrientation"
        [paneEnvironmentOverrideId]="paneEnvironmentIds.secondary"
        (paneMouseDown)="onPaneMouseDown($event)"
        (selectTabIndex)="onSelectTab('secondary', $event)"
        (tabClose)="onCloseTab('secondary', $event)"
        (tabsReorder)="onTabsReorder('secondary', $event)"
        (persistReorder)="onPersistReorder()"
        (closeOtherTabs)="onCloseOtherTabs('secondary', $event)"
        (closeTabsToRight)="onCloseTabsToRight('secondary', $event)"
        (closeAllTabsInPane)="onCloseAllTabsInPane('secondary')"
        (splitRight)="onSplitRight('secondary', $event)"
        (splitLeft)="onSplitLeft('secondary', $event)"
        (mergeSplit)="onMergeSplit()"
        (crossPaneTabMove)="onCrossPaneTabMove($event)"
        (paneEnvironmentOverrideChange)="onPaneEnvironmentOverride($event)"
        (tabDirtyChange)="onTabDirtyChange($event)"
        (duplicateRequestTab)="onDuplicateRequestTab('secondary', $event)"
        (pinToggleTab)="onPinToggleTab('secondary', $event)"
        (toggleSplitOrientation)="toggleSplitOrientation(); onPersistReorder()" />
    </div>
  }
  </div>
</div>
