<div class="app-container disable-select" [class.has-update-banner]="showGlobalUpdateBanner">

  @if (initError) {
    <div class="boot-shell boot-error" role="alert">
      <p class="boot-error-title">Could not load workspace</p>
      <p class="boot-error-detail">{{ initError }}</p>
      <button type="button" class="boot-retry" (click)="retryInit()">Retry</button>
      <app-bug-report-hint class="boot-bug-hint" [prominent]="true" [errorSummary]="initError" />
    </div>
  } @else if (!isReady) {
    <div class="boot-shell boot-loading" aria-busy="true" aria-live="polite">
      <div class="boot-spinner" aria-hidden="true"></div>
      <p class="boot-loading-text">Loading workspace…</p>
    </div>
  }

  <router-outlet *ngIf="isReady"></router-outlet>

  <app-batch-import-dialog *ngIf="isReady"></app-batch-import-dialog>

  <app-command-palette *ngIf="isReady"></app-command-palette>
  <app-shortcuts-panel *ngIf="isReady"></app-shortcuts-panel>
  <app-confirm-dialog-host *ngIf="isReady"></app-confirm-dialog-host>
  <app-runner-dialog *ngIf="isReady && runnerRequest"
                     [source]="runnerRequest.source"
                     [sourceLabel]="runnerRequest.sourceLabel"
                     [onClose]="closeRunnerDialog">
  </app-runner-dialog>

  <div *ngIf="showGlobalUpdateBanner" class="update-banner" role="status" aria-live="polite">
    <div class="update-banner-inner">
      <div class="update-banner-text">{{ updateBannerMessage }}</div>
      <div *ngIf="updaterUi?.state === 'downloading'" class="update-banner-progress">
        <div class="update-banner-progress-bar" [style.width.%]="updaterUi?.info?.percent || 0"></div>
      </div>
      <div class="update-banner-actions">
        <button *ngIf="updaterUi?.state === 'available'" type="button" class="update-banner-primary"
                (click)="startDownloadAndInstall()">
          Download and install
        </button>
        <button *ngIf="updaterUi?.state === 'downloaded' && !isAutomaticInstall" type="button" class="update-banner-primary"
                (click)="installAppUpdate()">
          Restart &amp; update
        </button>
        <button type="button" class="update-banner-secondary" (click)="dismissUpdateBanner()"
                [disabled]="updaterUi?.state === 'downloading'">
          {{ updaterUi?.state === 'downloaded' ? 'Later' : 'Dismiss' }}
        </button>
      </div>
    </div>
  </div>
</div>
